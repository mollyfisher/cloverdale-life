<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packet Night — A Civics Game - What Does City Council Do?</title>
<style>
  :root {
    --bg: #f4f1ea;
    --paper: #fffdf7;
    --ink: #1a1a1a;
    --muted: #5a5a5a;
    --rule: #d4cfc0;
    --accent: #7a3b2e;
    --warn: #a8541f;
    --good: #3d6b3d;
    --bad: #8b2e2e;
    --tab-inactive: #e8dfc8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.55;
    padding: 20px;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    background: var(--paper);
    padding: 36px 44px;
    border: 1px solid var(--rule);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  h1 {
    font-family: 'Georgia', serif;
    font-size: 28px;
    margin: 0 0 4px 0;
    letter-spacing: 0.5px;
  }
  .subtitle {
    color: var(--muted);
    font-style: italic;
    font-size: 15px;
    margin-bottom: 24px;
  }
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 2px solid var(--accent);
    flex-wrap: wrap;
  }
  .tab {
    padding: 12px 20px;
    background: var(--tab-inactive);
    border: 1px solid var(--rule);
    border-bottom: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    color: var(--muted);
    font-weight: bold;
    transition: all 0.15s;
    margin-right: 4px;
  }
  .tab:hover { background: #ddd0b0; color: var(--ink); }
  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .tab-content { padding-top: 24px; }
  .scene {
    font-style: italic;
    color: var(--muted);
    margin-bottom: 20px;
    padding: 14px 18px;
    border-left: 3px solid var(--accent);
    background: rgba(122, 59, 46, 0.04);
  }
  .meters {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px 18px;
    background: #f8f4e8;
    padding: 14px 18px;
    border: 1px solid var(--rule);
    margin-bottom: 20px;
    font-size: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .meter {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dotted #d4cfc0;
    padding: 2px 0;
  }
  .meter:last-child, .meter:nth-last-child(2) { border-bottom: none; }
  .meter-name { color: var(--muted); }
  .meter-value { font-weight: bold; font-variant-numeric: tabular-nums; }
  .budget {
    text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 17px;
    font-weight: bold;
    margin: 8px 0 24px 0;
    padding: 10px;
    background: #f0e8d4;
    border: 1px solid var(--rule);
  }
  .budget-detail {
    font-size: 13px;
    color: var(--muted);
    font-weight: normal;
    font-style: italic;
    margin-top: 4px;
  }
  .budget-low { background: #f5e0d0; color: var(--warn); }
  h2 {
    font-size: 20px;
    margin: 28px 0 8px 0;
    color: var(--accent);
  }
  .item {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
  }
  .item:last-child { border-bottom: none; }
  .item-title { font-weight: bold; margin-bottom: 4px; }
  .item-meta { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .item-note {
    font-style: italic;
    font-size: 14px;
    color: var(--warn);
    margin-bottom: 10px;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }
  .choice {
    text-align: left;
    padding: 10px 14px;
    background: var(--paper);
    border: 1px solid var(--rule);
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    transition: all 0.15s;
  }
  .choice:hover:not(:disabled) {
    background: #f0e8d4;
    border-color: var(--accent);
  }
  .choice.selected {
    background: #e8dfc8;
    border-color: var(--accent);
    border-width: 2px;
  }
  .choice:disabled { opacity: 0.5; cursor: not-allowed; }
  .choice-cost {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    float: right;
  }
  .popup {
    background: #fef5e0;
    border: 2px solid var(--warn);
    padding: 16px 20px;
    margin: 24px 0;
    position: relative;
  }
  .popup-label {
    position: absolute;
    top: -10px;
    left: 16px;
    background: var(--warn);
    color: white;
    padding: 2px 10px;
    font-size: 12px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 1px;
  }
  .popup-content { font-style: italic; margin-bottom: 12px; }
  .submit-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 24px;
    letter-spacing: 0.5px;
  }
  .submit-btn:hover:not(:disabled) { background: #5d2c22; }
  .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .resolution {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 2px solid var(--accent);
  }
  .res-item {
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #f8f4e8;
    border-left: 3px solid var(--muted);
  }
  .res-item.good { border-left-color: var(--good); }
  .res-item.bad { border-left-color: var(--bad); }
  .res-item.neutral { border-left-color: var(--muted); }
  .change {
    font-size: 13px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--muted);
    margin-top: 4px;
  }
  .change .up { color: var(--good); font-weight: bold; }
  .change .down { color: var(--bad); font-weight: bold; }
  .epilogue {
    margin-top: 24px;
    padding: 18px;
    background: #f0e8d4;
    font-style: italic;
    text-align: center;
  }
  .restart { margin-top: 20px; text-align: center; }
  .footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .block-info {
    background: #eef0e8;
    border: 1px solid #c8d0b8;
    padding: 10px 14px;
    margin: 16px 0;
    font-size: 14px;
  }
  .block-info strong { color: var(--accent); }
</style>
</head>
<body>
<div class="container">

<h1>Packet Night</h1>
<div class="subtitle">A game about being on city council. Pick a life, then play it.</div>

<div class="tabs">
  <button class="tab active" data-profile="retiree">Retiree</button>

<div class="tab-content" id="game-area"></div>

<div class="footer">A prototype. Built for thinking about civic education, not for shipping.</div>

let state = null;
let currentProfile = "retiree";

function initState(profileKey) {
  const profile = profiles[profileKey];
  state = {
    profileKey,
    profile,
    budget: profile.budget,
    initialBudget: profile.budget,
    meters: { ...profile.meters },
    choices: {},
    popupsTriggered: {}
  };
  profile.popups.forEach(p => state.popupsTriggered[p.id] = false);
}

function renderAll() {
  const area = document.getElementById("game-area");
  area.innerHTML = `
    <div class="scene">${state.profile.scene}</div>
    <div class="meters" id="meters"></div>
    <div class="budget" id="budget"></div>
    ${state.profile.blockNote ? `<div class="block-info">${state.profile.blockNote}</div>` : ''}
    <h2>Tuesday's Agenda — 12 items</h2>
    <div id="agenda"></div>
    <div id="popups"></div>
    <button class="submit-btn" id="submit" disabled>Go to Tuesday's meeting →</button>
    <div id="resolution"></div>
  `;
  renderMeters();
  renderBudget();
  renderAgenda();
  document.getElementById("submit").addEventListener("click", showResolution);
}

function renderMeters() {
  const el = document.getElementById("meters");
  el.innerHTML = Object.entries(state.meters).map(([name, val]) => {
    const isInverse = state.profile.inverseMeters.includes(name);
    return `<div class="meter"><span class="meter-name">${name}${isInverse ? ' (lower=better)' : ''}</span><span class="meter-value">${val}/10</span></div>`;
  }).join("");
}

function renderBudget() {
  const el = document.getElementById("budget");
  el.innerHTML = `${state.profile.budgetLabel}: ${state.budget} min<div class="budget-detail">${state.profile.budgetDetail}</div>`;
  el.className = state.budget < 25 ? "budget budget-low" : "budget";
}

function renderAgenda() {
  const el = document.getElementById("agenda");
  el.innerHTML = items.map(item => `
    <div class="item" data-item="${item.id}">
      <div class="item-title">Item ${item.id}. ${item.title}</div>
      <div class="item-meta">${item.meta}</div>
      ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
      <div class="choices">
        ${item.choices.map(c => `
          <button class="choice" data-item="${item.id}" data-key="${c.key}" data-cost="${c.cost}">
            ${c.label}
            <span class="choice-cost">${c.cost} min</span>
          </button>
        `).join('')}
      </div>
    </div>
  `).join("");

  el.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => handleChoice(btn));
  });
}

function handleChoice(btn) {
  const itemId = btn.dataset.item;
  const key = btn.dataset.key;
  const cost = parseInt(btn.dataset.cost);

  const prev = state.choices[itemId];
  if (prev) state.budget += prev.cost;

  if (state.budget - cost < 0) {
    alert("Not enough time left. Pick a faster option, or change an earlier choice.");
    if (prev) state.budget -= prev.cost;
    return;
  }

  state.budget -= cost;
  state.choices[itemId] = { key, cost };

  document.querySelectorAll(`.choice[data-item="${itemId}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  renderBudget();
  checkPopups();
  checkSubmitReady();
}

function checkPopups() {
  const spent = state.initialBudget - state.budget;
  state.profile.popups.forEach(p => {
    if (!state.popupsTriggered[p.id] && spent >= p.triggerAt) {
      state.popupsTriggered[p.id] = true;
      renderPopup(p);
    }
  });
}

function renderPopup(p) {
  const el = document.getElementById("popups");
  const div = document.createElement("div");
  div.className = "popup";
  div.innerHTML = `
    <div class="popup-label">${p.label}</div>
    <div class="popup-content">${p.content}</div>
    <div class="choices">
      ${p.choices.map(c => `
        <button class="choice" data-popup="${p.id}" data-key="${c.key}" data-cost="${c.cost}">
          ${c.label}
          <span class="choice-cost">${c.cost} min</span>
        </button>
      `).join('')}
    </div>
  `;
  el.appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "center" });

  div.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => handlePopupChoice(btn, p.id));
  });
}

function handlePopupChoice(btn, popupId) {
  const key = btn.dataset.key;
  const cost = parseInt(btn.dataset.cost);

  const prev = state.choices[`popup_${popupId}`];
  if (prev) state.budget += prev.cost;

  if (state.budget - cost < 0) {
    alert("Not enough time left.");
    if (prev) state.budget -= prev.cost;
    return;
  }

  state.budget -= cost;
  state.choices[`popup_${popupId}`] = { key, cost };

  document.querySelectorAll(`.choice[data-popup="${popupId}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  renderBudget();
  checkSubmitReady();
}

function checkSubmitReady() {
  const itemsAnswered = items.every(i => state.choices[i.id]);
  const popupsAnswered = state.profile.popups.every(p => !state.popupsTriggered[p.id] || state.choices[`popup_${p.id}`]);
  document.getElementById("submit").disabled = !(itemsAnswered && popupsAnswered);
}

function resolve() {
  const c = state.choices;
  const results = [];

  function adjust(meter, delta, reason) {
    state.meters[meter] = Math.max(0, Math.min(10, state.meters[meter] + delta));
    return { meter, delta, reason };
  }

  if (c[1]?.key === "consent_skim") {
    results.push({
      tone: "bad",
      text: "<strong>Consent calendar:</strong> The Henderson contract passed in the bundle without comment. Rosewater is visibly frustrated you didn't pull it. Two days later, a Press Democrat reporter calls asking why the council approved an amendment for a vendor with a problematic track record.",
      changes: [adjust("Colleague Relations", -1, "Rosewater wanted backup"), adjust("Re-election Viability", -1, "Press coverage")]
    });
  } else if (c[1]?.key === "consent_read") {
    results.push({
      tone: "neutral",
      text: "<strong>Consent calendar:</strong> You read it carefully. You saw the Henderson item but decided not to pull it. The vote passed cleanly. Rosewater mentions afterward he wishes you'd flagged it, but appreciates that you knew what was in it.",
      changes: []
    });
  } else if (c[1]?.key === "consent_pull") {
    results.push({
      tone: "neutral",
      text: "<strong>Consent calendar:</strong> You pulled the Henderson contract. 25 minutes of meeting discussion. Rosewater is grateful. The vendor's lobbyist sends a chilly email Wednesday. Staff is annoyed they have to redo the staff report.",
      changes: [adjust("Colleague Relations", 1, "Rosewater backed up"), adjust("Staff Relationship", -1, "Extra work for staff")]
    });
  }

  if (c[3]?.key === "oak_skim") {
    results.push({
      tone: "bad",
      text: "<strong>142 Oak Street:</strong> During public comment, a neighbor asks you directly about the mitigation measure on page 61 of the traffic study. You don't know it. You say \"I'll need to look at that.\" The room shifts. A Nextdoor thread starts Wednesday.",
      changes: [adjust("Constituent Trust", -1, "Visibly unprepared"), adjust("Re-election Viability", -1, "Public moment")]
    });
  } else if (c[3]?.key === "oak_read") {
    results.push({
      tone: "neutral",
      text: "<strong>142 Oak Street:</strong> You knew the staff report and correspondence. You handled the neighbor's questions about ingress/egress well. The traffic study question that came up was technical — staff fielded it. You looked competent.",
      changes: [adjust("Constituent Trust", 1, "Prepared")]
    });
  } else if (c[3]?.key === "oak_deep") {
    results.push({
      tone: "good",
      text: "<strong>142 Oak Street:</strong> You caught a discrepancy between the traffic study's peak-hour assumptions and the actual school pickup window. You raised it on the dais. Staff agreed to come back with a corrected analysis. Neighbors take note. Pilgrim does too.",
      changes: [adjust("Constituent Trust", 2, "Visible diligence"), adjust("Staff Relationship", -1, "Caught their error"), adjust("Colleague Relations", 1, "Pilgrim respected the catch")]
    });
  }

  if (c[4]?.key === "water_skim") {
    results.push({
      tone: "bad",
      text: "<strong>Water resilience letter:</strong> The letter passes 4-1, Pilgrim voting no. After the meeting he tells you privately he expected you to catch what was in there. You're not sure what he means until you re-read it Wednesday.",
      changes: [adjust("Colleague Relations", -1, "Missed the subtext")]
    });
  } else if (c[4]?.key === "water_read") {
    results.push({
      tone: "good",
      text: "<strong>Water resilience letter:</strong> You caught that one paragraph could be read as endorsing a position Pilgrim opposes. You proposed a friendly amendment. The letter passes 5-0. Pilgrim respects that you engaged with the substance.",
      changes: [adjust("Colleague Relations", 2, "Earned respect across difference")]
    });
  } else if (c[4]?.key === "water_call") {
    results.push({
      tone: "neutral",
      text: "<strong>Water resilience letter:</strong> The City Manager gave you helpful context. You were prepared but didn't propose changes. Pilgrim voted no. The City Manager appreciated that you came to her instead of escalating publicly.",
      changes: [adjust("Staff Relationship", 1, "Used the right channel")]
    });
  }

  if (c[5]?.key === "str_defer") {
    results.push({
      tone: "bad",
      text: "<strong>Short-term rentals:</strong> Public comment was heavier than expected — 47 speakers. Several asked detailed questions about Section 12 (the enforcement mechanism). You hadn't read it. You let staff field everything, which read as disengaged.",
      changes: [adjust("Constituent Trust", -1, "Looked checked out")]
    });
  } else if (c[5]?.key === "str_read") {
    results.push({
      tone: "good",
      text: "<strong>Short-term rentals:</strong> You came in with three specific questions about enforcement and one about grandfathering. Your questions shaped the second reading. Several speakers thanked you afterward for actually engaging with the substance.",
      changes: [adjust("Constituent Trust", 1, "Substantive engagement")]
    });
  }

  if (c.popup_rosewater?.key === "rosewater_sub") {
    results.push({
      tone: "bad",
      text: "<strong>The Rosewater text:</strong> You replied substantively about the Henderson contract. Tuesday afternoon, Pilgrim raises a question about whether a serial meeting occurred. The City Attorney has to weigh in. Nothing comes of it formally, but the City Clerk now watches your texts.",
      changes: [adjust("Legal Exposure", 2, "Possible Brown Act issue"), adjust("Staff Relationship", -1, "Flagged")]
    });
  } else if (c.popup_rosewater?.key === "rosewater_call") {
    results.push({
      tone: "good",
      text: "<strong>The Rosewater call:</strong> No written record. You walked through your respective concerns. He feels heard. You feel aligned without having committed to anything that creates a serial meeting problem.",
      changes: [adjust("Colleague Relations", 1, "Real conversation")]
    });
  } else if (c.popup_rosewater?.key === "rosewater_defer") {
    results.push({
      tone: "neutral",
      text: "<strong>The Rosewater text:</strong> He replied \"ok\" and left it alone. At Tuesday's meeting he was less prepared than he wanted to be on the Henderson item. He doesn't mention it, but you can tell.",
      changes: [adjust("Colleague Relations", -1, "Felt unsupported")]
    });
  } else if (c.popup_rosewater?.key === "rosewater_silent") {
    results.push({
      tone: "neutral",
      text: "<strong>The Rosewater text:</strong> No reply. At Tuesday's meeting he sat colder than usual. You'll need to repair this.",
      changes: [adjust("Colleague Relations", -1, "Read as dismissive")]
    });
  }

  if (c.popup_neighbor?.key === "neighbor_direct") {
    results.push({
      tone: "bad",
      text: "<strong>The 142 Oak email:</strong> You replied \"yes send it to me.\" The applicant's attorney noticed the ex parte communication during the hearing and put it on the record. You had to disclose. The decision survives, but a procedural challenge is now possible if the project is approved.",
      changes: [adjust("Legal Exposure", 3, "Ex parte on quasi-judicial"), adjust("Constituent Trust", 1, "Responsive")]
    });
  } else if (c.popup_neighbor?.key === "neighbor_proper") {
    results.push({
      tone: "good",
      text: "<strong>The 142 Oak email:</strong> You directed her to send to the full council and staff so it would be in the record. She did. Her data went into the public file. She felt respected; the hearing record is clean.",
      changes: [adjust("Constituent Trust", 1, "Took her seriously, properly")]
    });
  } else if (c.popup_neighbor?.key === "neighbor_clerk") {
    results.push({
      tone: "good",
      text: "<strong>The 142 Oak email:</strong> The City Clerk handled it through the proper channel. Clean record. Constituent slightly puzzled by the indirect response but ultimately fine.",
      changes: [adjust("Staff Relationship", 1, "Used the system")]
    });
  } else if (c.popup_neighbor?.key === "neighbor_defer") {
    results.push({
      tone: "bad",
      text: "<strong>The 142 Oak email:</strong> You meant to handle it Monday. You didn't. She showed up at the hearing visibly upset that no one had responded. Her three minutes of public comment were about being ignored.",
      changes: [adjust("Constituent Trust", -2, "Felt ignored")]
    });
  }

  // PROFILE-SPECIFIC

  if (c.popup_sister?.key === "sister_now") {
    results.push({
      tone: "good",
      text: "<strong>Your sister:</strong> The call ran 50 minutes. You both cried a little. You made a real decision about your mother. You also lost most of Sunday afternoon.",
      changes: [adjust("Energy Reserve", 1, "Did the hard thing")]
    });
  } else if (c.popup_sister?.key === "sister_short") {
    results.push({
      tone: "neutral",
      text: "<strong>Your sister:</strong> The conversation was rushed. You said you'd call back Wednesday. You both know you won't.",
      changes: [adjust("Energy Reserve", -1, "Carrying it unresolved")]
    });
  } else if (c.popup_sister?.key === "sister_later") {
    results.push({
      tone: "bad",
      text: "<strong>Your sister:</strong> You sent it to voicemail. By Tuesday morning the unreturned call is its own small weight in your chest.",
      changes: [adjust("Energy Reserve", -2, "Avoidance has a cost")]
    });
  }

  if (c.popup_kid?.key === "kid_full") {
    results.push({
      tone: "good",
      text: "<strong>The bedtime visit:</strong> Twenty minutes of back-rubbing. They were asleep before you left the room. You felt like a good parent. You also lost a fifth of your evening block.",
      changes: [adjust("Family Bandwidth", 1, "Showed up")]
    });
  } else if (c.popup_kid?.key === "kid_quick") {
    results.push({
      tone: "neutral",
      text: "<strong>The bedtime visit:</strong> Quick reset, back to the packet. They were up again twenty minutes later. You handled it more shortly the second time.",
      changes: []
    });
  } else if (c.popup_kid?.key === "kid_ignore") {
    results.push({
      tone: "bad",
      text: "<strong>The bedtime visit:</strong> They eventually went back to bed on their own. They mentioned it at breakfast Monday — that you didn't come. It was small. It also wasn't nothing.",
      changes: [adjust("Family Bandwidth", -2, "Noticed by a kid")]
    });
  }

  if (c.popup_client?.key === "client_now") {
    results.push({
      tone: "good",
      text: "<strong>The client call:</strong> 45 minutes, but you caught a scope misalignment that would have cost you twice that to fix later. Relationship strengthened.",
      changes: [adjust("Business Revenue", 1, "Protected the contract")]
    });
  } else if (c.popup_client?.key === "client_async") {
    results.push({
      tone: "neutral",
      text: "<strong>The client call:</strong> You sent a thorough email instead. They responded \"thanks, this works\" — but you can't tell from the email whether \"works\" means satisfied or annoyed.",
      changes: []
    });
  } else if (c.popup_client?.key === "client_defer") {
    results.push({
      tone: "bad",
      text: "<strong>The client call:</strong> By Monday morning they'd already made a decision without your input. The decision wasn't wrong, exactly. It also wasn't what you would have recommended.",
      changes: [adjust("Business Revenue", -1, "Lost the room")]
    });
  }

  const totalSpent = state.initialBudget - state.budget;
  const heavy = state.profile.personalCosts.heavy;
  const light = state.profile.personalCosts.light;
  if (totalSpent > heavy.threshold) {
    results.push({
      tone: heavy.tone,
      text: heavy.text,
      changes: [adjust(state.profile.personalMeterName, heavy.change, heavy.reason)]
    });
  } else if (totalSpent < light.threshold) {
    results.push({
      tone: light.tone,
      text: light.text,
      changes: [adjust(state.profile.personalMeterName, light.change, light.reason)]
    });
  }

  return results;
}

function showResolution() {
  const results = resolve();
  const el = document.getElementById("resolution");
  el.style.display = "block";
  el.innerHTML = `
    <div class="resolution">
      <h2>Tuesday, 6:00 PM — The Meeting</h2>
      ${results.map(r => `
        <div class="res-item ${r.tone}">
          ${r.text}
          ${r.changes.length ? `<div class="change">${r.changes.map(ch => {
            const arrow = ch.delta > 0 ? `<span class="up">+${ch.delta}</span>` : ch.delta < 0 ? `<span class="down">${ch.delta}</span>` : '';
            return ch.delta !== 0 ? `${ch.meter} ${arrow} (${ch.reason})` : '';
          }).filter(Boolean).join(' • ')}</div>` : ''}
        </div>
      `).join('')}

      <h2 style="margin-top: 32px;">Where you stand now</h2>
      <div class="meters">
        ${Object.entries(state.meters).map(([name, val]) => {
          const isInverse = state.profile.inverseMeters.includes(name);
          return `<div class="meter"><span class="meter-name">${name}${isInverse ? ' (lower=better)' : ''}</span><span class="meter-value">${val}/10</span></div>`;
        }).join("")}
      </div>

      <div class="epilogue">
        It's Tuesday night, 9:47 PM. The meeting ran long. You're heading home.<br>
        Friday afternoon, the next packet drops. It's 312 pages this time.<br><br>
        <strong>You have two more years of this.</strong>
      </div>

      <div class="restart">
        <button class="submit-btn" onclick="restartCurrentProfile()" style="max-width: 280px; margin: 20px auto 0;">Try a different Sunday →</button>
      </div>
    </div>
  `;
  el.scrollIntoView({ behavior: "smooth" });
  document.getElementById("submit").style.display = "none";
}

function restartCurrentProfile() {
  initState(currentProfile);
  renderAll();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentProfile = tab.dataset.profile;
    initState(currentProfile);
    renderAll();
  });
});

initState("retiree");
renderAll();
</script>
</body>
</html>
